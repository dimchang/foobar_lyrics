name: Build foobar2000 Lyrics Plugin

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout source code
      run: |
        git clone --depth 1 https://github.com/dimchang/foobar_lyrics.git source
        cd source
        git clone --depth 1 https://github.com/reupen/foobar2000-sdk-unmodified sdk

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64

    - name: Configure and Build
      run: |
        cd source
        mkdir build
        cd build
        cmake .. -G "MinGW Makefiles"
        mingw32-make -j4

    - name: Find DLL
      id: find_dll
      run: |
        $dll = Get-ChildItem -Recurse -Filter "*.dll" -Path "source/build" | Select-Object -First 1
        if ($dll) {
          echo "dll_found=true" >> $env:GITHUB_OUTPUT
          echo "dll_path=$($dll.FullName)" >> $env:GITHUB_OUTPUT
        } else {
          echo "dll_found=false" >> $env:GITHUB_OUTPUT
        }
      shell: pwsh

    - name: Upload DLL
      if: steps.find_dll.outputs.dll_found == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: foo_lyric_source.dll
        path: ${{ steps.find_dll.outputs.dll_path }}
        retention-days: 30