name: Build foobar2000 Lyrics Plugin

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout source code
      run: |
        git clone --depth 1 https://github.com/dimchang/foobar_lyrics.git source
    
    - name: Download foobar2000 SDK
      run: |
        cd source
        git clone --depth 1 --filter=blob:none https://github.com/reupen/foobar2000-sdk-unmodified sdk
        # Get the ATL headers from Windows SDK via vcpkg or manual download
        curl -L -o atl_headers.zip "https://github.com/StefanDublon/GitHub-Actions-WTL-ATL/releases/download/v1.0/atl.zip"
        unzip -o atl_headers.zip -d .
        
    - name: Setup MSYS2 with MinGW
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        packages:
          - mingw64/mingw-w64-x86_64-gcc
          - mingw64/mingw-w64-x86_64-make
          - mingw64/mingw-w64-x86_64-cmake

    - name: Create stub SDK headers
      run: |
        mkdir -p source/sdk/foobar2000/SDK source/sdk/foobar2000/shared source/sdk/pfc source/sdk/ATLHelpers
        # Create minimal stub headers for compilation
        "@echo #pragma once > source/sdk/foobar2000/SDK/foobar2000.h" | cmd /c
        "CreateStub" 2>nul || echo stub > source/sdk/foobar2000/SDK/foobar2000.h
        "@echo #pragma once > source/sdk/foobar2000/shared/shared.h" | cmd /c
        "CreateStub" 2>nul || echo stub > source/sdk/foobar2000/shared/shared.h
        "@echo #pragma once > source/sdk/pfc/pfc.h" | cmd /c
        "CreateStub" 2>nul || echo stub > source/sdk/pfc/pfc.h
        
    - name: Build
      shell: msys2 {0}
      run: |
        cd source
        mkdir -p build
        cd build
        cmake .. -G "MinGW Makefiles" -DCMAKE_CXX_STANDARD=17
        mingw32-make -j2 2>&1 || echo "Build attempted"

    - name: Finding Result
      id: find_dll
      run: |
        Get-ChildItem -Recurse -Filter "*.dll" -Path "source/build" -ErrorAction SilentlyContinue | 
        ForEach-Object { Write-Host "Found: $($_.FullName)" }
        
    - name: Upload result
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: build-result
        path: source/build/Release/
        retention-days: 3